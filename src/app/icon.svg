<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular Border -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#db2777" stroke-width="2" />
  <circle cx="100" cy="100" r="91" fill="none" stroke="#db2777" stroke-width="1" stroke-dasharray="4 2" opacity="0.5" />
  
  <!-- Stylized Pink X with Wings -->
  <g transform="translate(100, 100)">
    <!-- Main X -->
    <path d="M-15 -25 L15 25 M15 -25 L-15 25" stroke="#db2777" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Left Wing -->
    <path d="M-20 -5 Q-50 -25, -25 15 Q-40 0, -20 5" fill="#db2777" />
    <path d="M-20 -15 Q-60 -35, -30 5 Q-45 -10, -20 -5" fill="#db2777" opacity="0.8" />
    
    <!-- Right Wing -->
    <path d="M20 -5 Q50 -25, 25 15 Q40 0, 20 5" fill="#db2777" />
    <path d="M20 -15 Q60 -35, 30 5 Q45 -10, 20 -5" fill="#db2777" opacity="0.8" />
  </g>

  <!-- Text: X -->
  <text x="50" y="110" font-family="serif" font-size="28" font-weight="900" text-anchor="middle" fill="#db2777">X</text>
  
  <!-- Text: EMIRATES -->
  <text x="140" y="110" font-family="serif" font-size="20" font-weight="900" text-anchor="middle" fill="#db2777">EMIRATES</text>
  
  <!-- Small Text: LUXURY COLLECTION -->
  <text x="100" y="145" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#db2777" letter-spacing="2">LUXURY COLLECTION</text>
</svg>
